<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Timer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease;
        }
        #timer {
            font-size: 48px;
            font-weight: bold;
            font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-variant-numeric: tabular-nums slashed-zero;
            line-height: 1;
            white-space: nowrap;
            text-align: center;
            transition: color 0.3s ease;
        }
        #status {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 12px;
            color: #666;
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="timer">00:00:00:00</div>
    </div>

    <script>
        const timerDiv = document.getElementById('timer');
        const container = document.querySelector('.container');
        let currentTheme = {
            background: '#1f1f1f',
            transparentBackground: false,
            text: '#ffffff',
            font: 'ui-monospace',
            fontSize: '48px'
        };

        let socket = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;
        const baseDelay = 1000; // Start with 1 second delay


        function formatTime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            return `${String(days).padStart(2, '0')}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimer(data) {
            timerDiv.textContent = formatTime(data.remainingSeconds);
            fitTimer();
        }

        function getFontStack(font) {
            if (font === 'ui-monospace') {
                return 'ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
            }
            if (font === 'ui-sans-serif') {
                return 'ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
            }
            return `${JSON.stringify(String(font))}, ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, monospace`;
        }

        function fitTimer() {
            timerDiv.style.transform = 'none';
            requestAnimationFrame(() => {
                const availableWidth = Math.max(1, container.clientWidth - 16);
                const scale = Math.min(1, availableWidth / timerDiv.scrollWidth);
                timerDiv.style.transform = `scale(${scale})`;
            });
        }

        function applyTheme(settings) {
            const background = settings.transparentBackground ? 'transparent' : settings.background;
            document.body.style.backgroundColor = background;
            container.style.backgroundColor = background;
            timerDiv.style.color = settings.text;
            timerDiv.style.fontFamily = getFontStack(settings.font);
            timerDiv.style.fontSize = settings.fontSize;
            currentTheme = settings;
            fitTimer();
        }

        function connectWebSocket() {
            if (socket && socket.readyState !== WebSocket.CLOSED) {
                return; // Already connected or connecting
            }

            socket = new WebSocket('ws://localhost:42069');

            socket.addEventListener('open', () => {
                reconnectAttempts = 0; // Reset reconnection attempts on successful connection
                // Request theme settings when connection is established
                socket.send(JSON.stringify({ type: 'getTheme' }));
            });

            socket.addEventListener('message', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Handle different types of messages
                    if (data.type === 'theme') {
                        applyTheme(data.settings);
                    } else if (data.remainingSeconds !== undefined) {
                        updateTimer(data);
                    }
                } catch (error) {
                    console.error('Error parsing message:', error);
                }
            });

            socket.addEventListener('close', () => {
                // Attempt to reconnect with exponential backoff
                if (reconnectAttempts < maxReconnectAttempts) {
                    const delay = Math.min(baseDelay * Math.pow(2, reconnectAttempts), 30000); // Cap at 30 seconds
                    const nextAttempt = Math.round(delay/1000);
                    setTimeout(() => {
                        reconnectAttempts++;
                        connectWebSocket();
                    }, delay);
                }
            });

            socket.addEventListener('error', (error) => {
                console.error('WebSocket error:', error);
            });
        }

        // Initial connection
        connectWebSocket();

        // Initialize with sample data and default theme
        const initialData = {
            "totalSeconds": 0,
            "remainingSeconds": 0,
            "isRunning": false,
            "lastUpdated": Date.now()
        };
        updateTimer(initialData);
        applyTheme(currentTheme);
        window.addEventListener('resize', fitTimer);
    </script>
</body>
</html>
